// ══════════ CONFIG — SUPABASE BACKEND ══════════

// ── Supabase DB layer (same crm_* pattern: id + data jsonb, open RLS) ──
const supa = window.supabase.createClient(SB_URL, SB_KEY);
const TMAP = { ddl_mediators:'mediators', ddl_deals:'deals', ddl_orders:'orders' };
const TABLE = { ddl_mediators:'ddl_mediators', ddl_deals:'ddl_deals', ddl_orders:'ddl_orders' };
let _cache = null, _cacheAt = 0, _pending = null;
const CACHE_TTL = 8000; // Supabase is fast — short TTL keeps multi-user data fresh without hammering it

// ── Persist cache across page reloads so UI can render instantly with last-known data ──
function persistCache(){ try{ localStorage.setItem('ddl_cache_v1', JSON.stringify({data:_cache, at:_cacheAt})); }catch(e){} }
(function restoreCache(){
  try{
    const raw = localStorage.getItem('ddl_cache_v1');
    if(raw){ const o = JSON.parse(raw); if(o && o.data){ _cache = o.data; _cacheAt = o.at||0; } }
  }catch(e){}
})();

async function fetchAllRows(table){
  const first = await supa.from(table).select('data',{count:'exact'}).range(0,999);
  if(first.error) throw first.error;
  let all = first.data||[];
  const total = first.count!=null ? first.count : all.length;
  if(total>1000){
    const pages=[];
    for(let from=1000; from<total; from+=1000) pages.push(supa.from(table).select('data').range(from, from+999));
    const results = await Promise.all(pages);
    for(const r of results){ if(r.error) throw r.error; all=all.concat(r.data||[]); }
  }
  return all;
}
async function loadStore(force){
  if(!force && _cache && (Date.now()-_cacheAt) < CACHE_TTL) return _cache;
  if(_pending) return _pending; // dedupe: concurrent callers share the same in-flight fetch
  _pending = (async()=>{
    let m,d,o;
    try{
      [m,d,o] = await Promise.all([
        fetchAllRows('ddl_mediators'),
        fetchAllRows('ddl_deals'),
        fetchAllRows('ddl_orders')
      ]);
    }catch(err){ alert('⚠️ Backend error: '+err.message); throw err; }
    _cache = {
      mediators: m.map(r=>r.data),
      deals: d.map(r=>r.data),
      orders: o.map(r=>r.data)
    };
    _cacheAt = Date.now();
    persistCache();
    return _cache;
  })();
  try { return await _pending; }
  finally { _pending = null; }
}
// Warm the cache the moment the page opens — by the time user taps into a view, data is likely already fresh
loadStore().catch(()=>{});
async function dbAll(t,force){
  try { const st = await loadStore(force); return st[TMAP[t]] || []; }
  catch(e){ console.error(e); return []; }
}
// ── Universal saving indicator (color pill, top of screen) so user always knows if a submit went through ──
function saveIndicator(){
  let el=document.getElementById('save-indicator');
  if(!el){
    el=document.createElement('div'); el.id='save-indicator';
    el.style.cssText='position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:99999;padding:9px 18px;border-radius:20px;font-family:Manrope;font-weight:800;font-size:12.5px;box-shadow:var(--shadow-md);transition:background .15s,color .15s;pointer-events:none;';
    document.body.appendChild(el);
  }
  return el;
}
function saveStart(){
  const el=saveIndicator();
  el.style.background='#FEF3C7'; el.style.color='#92400E'; el.textContent='💾 Saving...'; el.style.display='block';
  return el;
}
function saveOk(){
  const el=saveIndicator();
  el.style.background='#D1FAE5'; el.style.color='#065F46'; el.textContent='✅ Saved'; el.style.display='block';
  clearTimeout(el._t); el._t=setTimeout(()=>{ el.style.display='none'; },1100);
}
function saveErr(msg){
  const el=saveIndicator();
  el.style.background='#FFE4E6'; el.style.color='#BE123C'; el.textContent='❌ '+(msg||'Failed — try again'); el.style.display='block';
  clearTimeout(el._t); el._t=setTimeout(()=>{ el.style.display='none'; },2800);
}
async function dbIns(t,o){
  saveStart();
  try{
    const { data, error } = await supa.from(TABLE[t]).insert({ id:o.id, data:o }).select().single();
    if(error){ saveErr(error.message); alert('❌ '+error.message); throw error; }
    const saved = data.data;
    if(_cache){ (_cache[TMAP[t]]=_cache[TMAP[t]]||[]).push(saved); persistCache(); }
    saveOk();
    return saved;
  }catch(e){ saveErr(); throw e; }
}
async function dbUpd(t,o){
  saveStart();
  try{
    const { data, error } = await supa.from(TABLE[t]).update({ data:o }).eq('id',o.id).select().single();
    if(error){ saveErr(error.message); alert('❌ '+error.message); throw error; }
    const saved = data.data;
    if(_cache){ const a=_cache[TMAP[t]]||[]; const i=a.findIndex(x=>x.id===o.id); if(i>-1)a[i]=saved; persistCache(); }
    saveOk();
    return saved;
  }catch(e){ saveErr(); throw e; }
}
async function dbDel(t,id){
  saveStart();
  try{
    const { error } = await supa.from(TABLE[t]).delete().eq('id',id);
    if(error){ saveErr(error.message); alert('❌ '+error.message); throw error; }
    if(_cache){ _cache[TMAP[t]]=(_cache[TMAP[t]]||[]).filter(x=>x.id!==id); persistCache(); }
    saveOk();
  }catch(e){ saveErr(); throw e; }
}

function today(){ return new Date().toISOString().split('T')[0]; }

function compressImg(file){ return new Promise(res=>{ const r=new FileReader(); r.onload=e=>{ const im=new Image(); im.onload=()=>{ const mw=900,sc=Math.min(1,mw/im.width); const c=document.createElement('canvas'); c.width=im.width*sc; c.height=im.height*sc; c.getContext('2d').drawImage(im,0,0,c.width,c.height); res(c.toDataURL('image/jpeg',0.7)); }; im.src=e.target.result; }; r.readAsDataURL(file); }); }
function copyTxt(el){ navigator.clipboard.writeText(el.textContent).then(()=>{ const o=el.style.background; el.style.background='#D1FAE5'; setTimeout(()=>el.style.background=o,600); }); }

  showOpts(['💸 Refund Form','🔍 Order Status','✉️ Change Gmail']);
}
async function loadLinkedOffer(){
  const deals=await dbAll('ddl_deals');
  const of=deals.find(d=>d.id===CS.offerFromLink&&d.type==='offer'&&d.active&&d.buyerLess!=null);
  if(!of){ botSay('❌ Yeh deal link active nahi hai. Jisne link diya hai unse naya link maangein.'); mainMenu(''); return; }
  const slotsLeft=offerSlotsLeft(of);
  if(slotsLeft<=0){ botSay('😔 Sorry! Yeh deal FULL ho gayi hai — saare slots book ho chuke hain.'); mainMenu(''); return; }
  showDeal(of);
}
function getSlots(of){
  if(of.slots&&of.slots.length) return of.slots;
  return Array.from({length:+of.qty||0},(_,i)=>({n:i+1,status:'open'}));
}
function offerSlotsLeft(of){
  if(!of.qty) return 999999;
  return getSlots(of).filter(s=>s.status==='open').length;
}
function showDeal(of){
  CS.offer=of; CS.step='slotpick';
  const refund=(+of.price||0)-(+of.buyerLess||0);
  let html='<div style="font-weight:800;margin-bottom:6px;">🎁 Deal Details</div>';
  if(of.image) html+='<img src="'+of.image+'" style="max-width:200px;border-radius:10px;margin-bottom:8px;">';
  html+='📦 <b>'+esc(of.productName)+'</b>'+(of.dealType?' <span class="badge b-blue">'+esc(of.dealType)+' Deal</span>':'')+'<br>💰 Price: ₹'+esc(of.price)+'<br>🔻 Less: ₹'+esc(of.buyerLess)+'<br>✅ <b>Refund milega: ₹'+refund+'</b>'+(of.link?'<br>🔗 <a href="'+esc(of.link)+'" target="_blank" style="color:var(--primary);font-weight:800;">Product Link kholein</a>':'');
  botSay(html,true);
  botSay('👇 Apna slot number choose karein (🔴 = available, 🟡 = kisi ne grab kiya hai, 🟢 = confirm ho chuka):');
  showSlotGrid(of);
  showOpts(['🔙 Back']);
}
function showSlotGrid(of){
  const slots=getSlots(of);
  const w=document.createElement('div'); w.className='chat-opts slot-grid-wrap';
  slots.forEach(s=>{
    const b=document.createElement('button');
    b.className='slot-btn '+(s.status==='confirmed'?'slot-green':s.status==='pending'?'slot-yellow':'slot-red');
    b.textContent=s.n;
    b.disabled=s.status!=='open';
    if(s.status==='open'){
      b.onclick=()=>{
        w.remove(); userSay('Slot #'+s.n+' select kiya');
        CS.order.offerId=of.id; CS.order.dealId=of.dealId; CS.order.productCode=of.productCode;
        CS.order.mediatorCode=of.mediatorCode; CS.order.adminLess=+of.adminLess||0; CS.order.buyerLess=+of.buyerLess||0;
        CS.order.cut=(+of.buyerLess||0)-(+of.adminLess||0); CS.order.price=+of.price||0;
        CS.grabSlot=s.n; CS.step='grab_name';
        botSay('✋ Slot #'+s.n+' choose kiya! Apna Full Name batayiye:');
      };
    }
    w.appendChild(b);
  });
  msgs.appendChild(w); msgs.scrollTop=msgs.scrollHeight;
}
async function grabSlot(offerId,n,name,gmail){
  const deals=await dbAll('ddl_deals',true);
  const of=deals.find(d=>d.id===offerId);
  if(!of) return {ok:false,msg:'Deal nahi mili.'};
  const slots=getSlots(of);
  const slot=slots.find(x=>x.n===n);
  if(!slot||slot.status!=='open') return {ok:false,msg:'Yeh slot already le liya gaya hai. Dusra choose karein.'};
  slot.status='pending'; slot.name=name; slot.gmail=gmail; slot.claimedAt=new Date().toISOString();
  of.slots=slots;
  await dbUpd('ddl_deals',of);
  return {ok:true};
}
function watchMySlot(offerId,n){
  try{
    CS.slotChannel=supa.channel('my-slot-'+offerId+'-'+n+'-'+Date.now())
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'ddl_deals',filter:'id=eq.'+offerId},payload=>{
        const slots=(payload.new&&payload.new.data&&payload.new.data.slots)||[];
        const slot=slots.find(x=>x.n===n);
        if(!slot||CS.grabSlot!==n) return;
        if(slot.status==='confirmed') onSlotConfirmed();
        else if(slot.status==='open') onSlotRejected();
      }).subscribe();
  }catch(e){}
  CS.slotPoll=setInterval(async()=>{
    const deals=await dbAll('ddl_deals',true);
    const of=deals.find(d=>d.id===offerId);
    const slot=of&&getSlots(of).find(x=>x.n===n);
    if(!slot||CS.grabSlot!==n) return;
    if(slot.status==='confirmed') onSlotConfirmed();
    else if(slot.status==='open') onSlotRejected();
  },6000);
}
function stopSlotWatch(){
  if(CS.slotChannel){ try{supa.removeChannel(CS.slotChannel);}catch(e){} CS.slotChannel=null; }
  if(CS.slotPoll){ clearInterval(CS.slotPoll); CS.slotPoll=null; }
}
function onSlotConfirmed(){
  stopSlotWatch();
  botSay('✅ Aapki slot request APPROVE ho gayi hai! 🎉');
  CS.step='o_orderid';
  botSay('Ab order complete karein — Apna Order ID batayiye:');
}
function onSlotRejected(){
  stopSlotWatch();
  botSay('❌ Aapki request reject ho gayi ya slot release ho gaya.\n\nDobara koi aur slot choose karein:');
  dbAll('ddl_deals',true).then(deals=>{
    const of=deals.find(d=>d.id===CS.offer.id);
    if(of) showDeal(of); else mainMenu('');
  });
}
function botSay(t,html){ const d=document.createElement('div'); d.className='msg bot'; if(html)d.innerHTML=t; else d.textContent=t; msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight; }
function userSay(t){ const d=document.createElement('div'); d.className='msg user'; d.textContent=t; msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight; }
function showOpts(arr){ const w=document.createElement('div'); w.className='chat-opts'; arr.forEach(o=>{ const b=document.createElement('button'); b.className='chat-opt'; b.textContent=o; b.onclick=()=>{ w.remove(); userSay(o); handleChat(o); }; w.appendChild(b); }); msgs.appendChild(w); msgs.scrollTop=msgs.scrollHeight; }
function showUpload(label){ const w=document.createElement('div'); w.className='chat-opts'; const b=document.createElement('button'); b.className='chat-opt'; b.textContent=label||'📸 Upload Screenshot'; b.onclick=()=>{ const f=document.createElement('input'); f.type='file'; f.accept='image/*'; f.onchange=async e=>{ if(!e.target.files[0])return; w.remove(); const img=await compressImg(e.target.files[0]); const d=document.createElement('div'); d.className='msg user'; d.innerHTML='<img src="'+img+'">'; msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight; handleChat(img); }; f.click(); }; w.appendChild(b); msgs.appendChild(w); msgs.scrollTop=msgs.scrollHeight; }
function sendChat(){ const i=document.getElementById('ci'); const t=i.value.trim(); if(!t)return; i.value=''; userSay(t); handleChat(t); }

function statusView(o){
  const idx=STATUS_FLOW.indexOf(o.status);
  let tl='<div style="font-weight:800;margin-bottom:8px;">📦 '+esc(o.orderId)+' · '+esc(o.productCode||'')+'</div><div class="timeline">';
  STATUS_FLOW.forEach((st,i)=>{
    const done=i<=idx;
    const h=(o.history||[]).find(x=>x.s===st);
    tl+='<div class="tl-step"><div class="tl-dot"><div class="c '+(done?'done':'')+'">'+(done?'✓':(i+1))+'</div>'+(i<STATUS_FLOW.length-1?'<div class="l '+(i<idx?'done':'')+'"></div>':'')+'</div><div class="tl-txt">'+st+(h?'<div class="d">'+h.d+'</div>':'')+'</div></div>';
  });
  tl+='</div>';
  if(o.status==='Refunded') tl+='<div class="alert a-ok" style="margin:6px 0 0;">✅ REFUND DONE: ₹'+esc(o.refund&&o.refund.amount!=null?o.refund.amount:((+o.price||0)-(+o.buyerLess||0)))+'</div>';
  else if(o.status==='Refund Form Filled') tl+='<div class="alert a-warn" style="margin:6px 0 0;">⏳ Refund PENDING — process ho raha hai</div>';
  else tl+='<div class="muted">Expected refund: ₹'+((+o.price||0)-(+o.buyerLess||0))+'</div>';
  if(o.adminNote) tl+='<div class="alert a-err" style="margin:6px 0 0;">📢 Admin: '+esc(o.adminNote)+'</div>';
  return tl;
}

async function handleChat(input){
  const s=CS;
  // Global options available from code step
  if(s.step==='code'||s.step==='slotpick'){
    if(input.includes('Refund Form')){ s.step='r_find'; botSay('Apna Order ID batayiye:'); return; }
    if(input.includes('Order Status')){ s.step='s_find'; botSay('Apna Order ID batayiye: 🔍'); return; }
    if(input.includes('Change Gmail')){ s.step='g'; botSay('Naya Gmail address batayiye:'); return; }
  }
  // GMAIL (once)
  if(s.step==='g'){
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(input)){ botSay('❌ Valid email daaliye (e.g. name@gmail.com):'); return; }
    localStorage.setItem('ddl_gmail',input);
    CS.order.gmail=input;
    botSay('✅ Gmail save ho gaya! Ab dobara nahi poochha jayega.');
    if(CS.offerFromLink){ loadLinkedOffer(); return; }
    mainMenu(''); return;
  }
  // PRODUCT/DEAL CODE
  if(s.step==='code'){
    const raw=input.trim().toUpperCase();
    const deals=await dbAll('ddl_deals');
    const offers=deals.filter(d=>d.type==='offer'&&d.active&&d.buyerLess!=null);
    let of=null;
    if(raw.includes('-')){
      of=offers.find(d=>((d.mediatorCode+'-'+d.productCode).toUpperCase()===raw));
    } else {
      of=offers.find(d=>d.mediatorCode===ADMIN_CODE&&String(d.productCode).toUpperCase()===raw);
    }
    if(!of){ botSay('❌ Is code par koi active deal nahi mili. Deal Code dobara check karke daaliye:'); showOpts(['💸 Refund Form','🔍 Order Status']); return; }
    const slotsLeft=offerSlotsLeft(of);
    if(slotsLeft<=0){ botSay('😔 Sorry! Yeh deal FULL ho gayi hai — saare slots book ho chuke hain.'); showOpts(['💸 Refund Form','🔍 Order Status']); return; }
    showDeal(of); return;
  }
  // SLOT PICK screen options
  if(s.step==='slotpick'){
    if(input.includes('Back')){ mainMenu(''); return; }
  }
  // GRAB — name entry after picking a slot
  if(s.step==='grab_name'){
    const name=input.trim();
    if(!name){ botSay('Naam daaliye:'); return; }
    botSay('⏳ Request bheji ja rahi hai...');
    const res=await grabSlot(s.offer.id, s.grabSlot, name, s.order.gmail);
    if(!res.ok){
      botSay('😔 '+res.msg);
      const deals=await dbAll('ddl_deals',true);
      const of=deals.find(d=>d.id===s.offer.id);
      if(of) showDeal(of); else mainMenu('');
      return;
    }
    s.order.name=name;
    botSay('✅ Request bhej di! Admin/Mediator approve karega — thoda wait karein... ⏳\n\n(Yeh chat khuli rakhein, approve hote hi yahin update aa jayega)');
    watchMySlot(s.offer.id, s.grabSlot);
    return;
  }
  // ORDER FLOW (starts after slot approved)
  if(s.step==='o_orderid'){
    const all=await dbAll('ddl_orders');
    if(all.find(o=>o.orderId===input)){ botSay('⚠️ Yeh Order ID already registered hai!'); mainMenu(''); return; }
    s.order.orderId=input;
    s.step='o_amount'; botSay('💰 Order kitne ka tha? Amount daaliye (₹):'); return;
  }
  if(s.step==='o_amount'){
    const amt=+input.replace(/[^\d.]/g,'');
    if(!amt||amt<=0){ botSay('❌ Valid amount daaliye (e.g. 499):'); return; }
    s.order.amount=amt; s.order.platform='';
    s.step='o_platform'; botSay('Kis platform se order kiya?'); showOpts(['Meesho','Amazon','Flipkart']); return;
  }
  if(s.step==='o_platform'){ s.order.platform=input; s.step='o_shot'; botSay('Order ka screenshot upload karein: 📸'); showUpload(); return; }
  if(s.step==='o_shot'){
    s.order.screenshot=input;
    botSay('⏳ Order register ho raha hai...');
    let o={ id:'ord_'+Date.now(), ...s.order, status:'Ordered', orderDate:today(), refund:{}, history:[{s:'Ordered',d:today()}] };
    o=await dbIns('ddl_orders',o)||o;
    botSay('🎉 Order successfully registered!\n\nYeh raha aapka current status: 👇');
    botSay(statusView(o),true);
    botSay('✅ Confirm ho gaya! Review/rating karke Refund Form bharein. Order ID sambhal ke rakhein: '+o.orderId);
    mainMenu(''); return;
  }
  // REFUND FLOW
  if(s.step==='r_find'){
    const all=await dbAll('ddl_orders');
    const o=all.find(x=>x.orderId===input)||all.filter(x=>x.gmail===input).pop();
    if(!o){ botSay('❌ Koi order nahi mila. Order ID dobara check karein:'); return; }
    botSay(statusView(o),true);
    if(o.status==='Refunded'){ mainMenu(''); return; }
    if(o.status==='Refund Form Filled'){ botSay('⏳ Refund form already submitted hai.'); mainMenu(''); return; }
    s.refOrder=o; s.step='r_type';
    botSay('✅ Refund form khul gaya!\n\nAapne kya kiya hai — Rating ya Review?\n\n⭐ Rating → Rating + Seller Feedback dono screenshots dene honge\n📝 Review → sirf Review screenshot');
    showOpts(['⭐ Rating','📝 Review']); return;
  }
  if(s.step==='r_type'){
    if(input.includes('Rating')){ s.refType='Rating'; s.refShots=[]; s.step='r_shot_rating'; botSay('⭐ Rating ka screenshot upload karein:'); showUpload('📸 Rating Screenshot'); return; }
    if(input.includes('Review')){ s.refType='Review'; s.refShots=[]; s.step='r_shot_review'; botSay('📝 Review ka screenshot upload karein:'); showUpload('📸 Review Screenshot'); return; }
    botSay('Rating ya Review select karein:'); showOpts(['⭐ Rating','📝 Review']); return;
  }
  if(s.step==='r_shot_rating'){ s.refShots.push(input); s.step='r_shot_feedback'; botSay('✅ Rating screenshot mil gaya!\n\nAb Seller Feedback ka screenshot upload karein (compulsory):'); showUpload('📸 Seller Feedback Screenshot'); return; }
  if(s.step==='r_shot_feedback'){ s.refShots.push(input); s.step='r_upi'; botSay('✅ Dono screenshots mil gaye!\n\nApna UPI ID batayiye (e.g. name@paytm):'); return; }
  if(s.step==='r_shot_review'){ s.refShots.push(input); s.step='r_upi'; botSay('✅ Review screenshot mil gaya!\n\nApna UPI ID batayiye (e.g. name@paytm):'); return; }
  if(s.step==='r_upi'){
    if(!input.includes('@')){ botSay('❌ Valid UPI ID daaliye (e.g. name@paytm):'); return; }
    botSay('⏳ Submit ho raha hai...');
    const o=s.refOrder;
    const expected=(o.buyerLess!=null)?((+o.price||0)-(+o.buyerLess||0)):(+o.amount||+o.price||0);
    o.status='Refund Form Filled';
    o.refund={ upi:input, type:s.refType, shots:[...s.refShots], filledDate:today(), amount:expected };
    o.history=o.history||[]; o.history.push({s:'Refund Form Filled',d:today()});
    await dbUpd('ddl_orders',o);
    botSay('🎉 Refund form submitted!\n\n📋 Type: '+s.refType+'\n💳 UPI: '+input+'\n💵 Expected: ₹'+expected+'\n\nAdmin verify karke refund karega. Order ID daal kar kabhi bhi status check karein — Done hone par yahin dikhega, koi dikkat hui toh admin ka comment bhi yahin aayega. ✅');
    mainMenu(''); return;
  }
  // STATUS
  if(s.step==='s_find'){
    const all=await dbAll('ddl_orders');
    const found=all.filter(o=>o.orderId===input||o.gmail===input);
    if(!found.length){ botSay('❌ Koi order nahi mila:'); return; }
    for(const o of found) botSay(statusView(o),true);
    mainMenu(''); return;
  }
  // fallback
  if(!s.step) mainMenu('');
}

async function setBuyerLess(offerId){

// ══════════ SLOT GRID (admin + mediator shared) ══════════
function renderSlotGrid(of){
  const slots=getSlots(of);
  const legend='<div class="slot-legend"><span><i style="background:var(--danger);"></i>Open</span><span><i style="background:var(--warn);"></i>Pending — tap to approve/reject</span><span><i style="background:var(--accent);"></i>Confirmed — tap to release</span></div>';
  const dots=slots.map(s=>{
    const cls=s.status==='confirmed'?'slot-green':s.status==='pending'?'slot-yellow':'slot-red';
    const title=s.status==='open'?'Slot #'+s.n+' — Open':'Slot #'+s.n+' — '+esc(s.name||'')+' ('+s.status+')';
    return `<button class="slot-dot ${cls}" title="${title}" onclick="slotAction('${of.id}',${s.n})" ${s.status==='open'?'disabled':''}>${s.n}</button>`;
  }).join('');
  return legend+'<div class="slot-grid-wrap">'+dots+'</div>';
}
async function slotAction(offerId,n){
  const deals=await dbAll('ddl_deals',true);
  const of=deals.find(d=>d.id===offerId); if(!of) return;
  const slots=getSlots(of);
  const slot=slots.find(x=>x.n===n); if(!slot) return;
  if(slot.status==='open') return;
  if(slot.status==='confirmed'){
    if(!confirm('Slot #'+n+' — '+(slot.name||'')+'\n\n✅ Confirmed hai. Release karke wapas OPEN karna hai?')) return;
    slot.status='open'; slot.name=null; slot.gmail=null; slot.claimedAt=null; slot.confirmedAt=null;
  } else {
    const approve=confirm('Slot #'+n+' Request:\n👤 '+(slot.name||'')+'\n\nOK = ✅ Approve\nCancel = ❌ Reject');
    if(approve){ slot.status='confirmed'; slot.confirmedAt=today(); }
    else { slot.status='open'; slot.name=null; slot.gmail=null; slot.claimedAt=null; }
  }
  of.slots=slots;
  await dbUpd('ddl_deals',of);
  refreshCurrentView();
}
function refreshCurrentView(){
  if(view==='admin'&&window._D) adminMain(window._curAdminTab||'deals',true);
  else if(view==='mediator'&&MED) medDash(true);
}
let _slotWatchChannel=null;
function startSlotWatch(){
  if(_slotWatchChannel) return;
  try{
    _slotWatchChannel=supa.channel('ddl-slot-watch-'+Date.now())
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'ddl_deals'},async payload=>{
        try{
          const newData=payload.new&&payload.new.data; if(!newData) return;
          const prevOf=((_cache&&_cache.deals)||[]).find(d=>d.id===payload.new.id);
          const prevSlots=(prevOf&&prevOf.slots)||[];
          const newSlots=newData.slots||[];
          const newlyPending=newSlots.filter(ns=>ns.status==='pending'&&!prevSlots.some(ps=>ps.n===ns.n&&ps.status==='pending'));
          const relevant=view==='admin'||(view==='mediator'&&MED&&newData.mediatorCode===MED.code);
          await loadStore(true);
          if(newlyPending.length&&relevant){
            playAlarm(4);
            notify('🔔 SLOT REQUEST!', (newlyPending[0].name||'Buyer')+' ne Slot #'+newlyPending[0].n+' grab kiya — approve karo!');
          }
          refreshCurrentView();
        }catch(e){}
      }).subscribe();
  }catch(e){}
}

function buildShareMsg(of, ordersArr){
  const used=(ordersArr||[]).filter(o=>o.offerId===of.id).length;
  const left=of.qty?Math.max(0,(+of.qty)-used):'';
  const code=of.mediatorCode===ADMIN_CODE?of.productCode:(of.mediatorCode+'-'+of.productCode);
  const refund=(+of.price||0)-(+of.buyerLess||0);
  const offerLine=(+of.buyerLess||0)===0?'*Full Refund* filling the refund form!':'*Rs.'+refund+' Refund* (sirf Rs.'+of.buyerLess+' lagega) filling the refund form!';
  let m='\ud83d\udecd\ufe0f *NEW HOT DEAL ALERT!*\n\n';
  if(of.link) m+='\ud83d\udd17 Product Link:\n'+of.link+'\n\n';
  m+='\ud83d\udd22 Deal Code: *'+code+'*\n\n';
  if(of.dealType) m+='\ud83c\udff7\ufe0f Deal Type: [ *'+of.dealType+' Deal* ]\n\n';
  m+='\ud83d\udcb0 Price: Rs.'+of.price+'\n\ud83d\udcb8 Offer: '+offerLine+'\n\n';
  m+='\u23f0 Refund Time: Review live hone ke baad 24-48 hours mein.\n\n';
  m+='\u26a0\ufe0f Condition: Agar 30 minutes mein order kar sakte hain toh hi order karein.\n\n';
  if(left!=='') m+='\ud83c\udfb0 Availability: Only *'+left+' slots* left!\n\n';
  m+='\ud83e\udd16 Order Form (DDL Agent):\n'+baseUrl()+'?v=buyer&deal='+of.id+'\n\n';
  m+='\ud83d\udc49 Deal Code daal kar 2 minute mein order register karein!';
  return m;
}
function shareOffer(offerId, from){
  const offers=from==='med'?window._offers:(window._D&&window._D.deals||[]);
  const orders=from==='med'?(window._medOrders||[]):(window._D&&window._D.orders||[]);
  const of=offers.find(x=>x.id===offerId); if(!of)return;
  const msg=buildShareMsg(of, orders);
  try{ navigator.clipboard.writeText(msg); }catch(e){}
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

    <div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Buyer</th><th>Order ID</th><th>Deal Value</th><th>Refund</th><th>Commission</th><th>Status</th></tr></thead>
      <tbody>${rows.map(r=>{
        const bg=r.flag==='loss'?'background:#FFF1F2;':r.flag==='unknown'?'background:#F6F5FB;':'';

          <td>${esc(r.o.orderDate)}</td>
          <td>${esc(r.o.name)}</td>

          <td>₹${r.refundAmt}</td>

          <td>${statusBadge(r.o.status)}</td>
        </tr>`;
      }).join('')}</tbody></table></div>`}`;
}

        <div class="dt-name">${esc(m.productName)}</div>
        <div class="dt-count">${confSlots}/${totalSlots||'∞'}${pendSlots?' <span class="dt-pend">🟡'+pendSlots+'</span>':''}</div>

    </div>

}

        </select>
        <input id="as-less-${m.id}" type="number" placeholder="Admin Less ₹" style="width:120px;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Manrope;">
        <input id="as-qty-${m.id}" type="number" placeholder="Qty" style="width:80px;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Manrope;">
        <button class="btn btn-sm btn-grad" style="width:auto;" onclick="assignOffer('${m.id}')">🎯 Assign</button>

      return `<div style="border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;">

    <div style="font-weight:800;font-family:Sora;margin:14px 0 8px;">📋 Orders (${mOrders.length})</div>

async function createMaster(){
  const pc=document.getElementById('md-pc').value.trim().toUpperCase();
  const pn=document.getElementById('md-pn').value.trim();
  const price=+document.getElementById('md-price').value||0;
  const qty=+document.getElementById('md-qty').value||0;
  if(!pc||!pn||!price){alert('Code, name, price required!');return;}
  let image='';
  const f=document.getElementById('md-img').files[0];
  if(f) image=await compressImg(f);
  const link=document.getElementById('md-link').value.trim();
  const dealType=document.getElementById('md-dtype').value;
  await dbIns('ddl_deals',{id:'deal_'+Date.now(),type:'master',productCode:pc,productName:pn,price,qty,image,link,dealType,createdAt:today()});
  adminMain('deals');
}
async function assignOffer(dealId){
  const {deals}=window._D;
  const m=deals.find(d=>d.id===dealId);
  const medCode=document.getElementById('as-med-'+dealId).value;
  const adminLess=+document.getElementById('as-less-'+dealId).value;
  const qty=+document.getElementById('as-qty-'+dealId).value;
  if(isNaN(adminLess)){alert('Admin Less daalo (0 bhi chal sakta hai full refund ke liye)!');return;}
  if(!qty||qty<1){alert('Qty daalo — kitne slots dene hain!');return;}
  const assigned=deals.filter(d=>d.type==='offer'&&d.dealId===dealId).reduce((s2,o2)=>s2+(+o2.qty||0),0);
  if(m.qty&&(assigned+qty)>+m.qty){alert('❌ Itne slots nahi bache!\nTotal: '+m.qty+' | Assigned: '+assigned+' | Bache: '+(+m.qty-assigned));return;}
  const isOwn=medCode===ADMIN_CODE;
  const of={id:'offer_'+Date.now(),type:'offer',dealId,productCode:m.productCode,productName:m.productName,price:m.price,image:m.image||'',link:m.link||'',dealType:m.dealType||'',qty,
    mediatorCode:medCode,adminLess,buyerLess:isOwn?adminLess:null,active:isOwn,createdAt:today(),
    slots:Array.from({length:qty},(_,i)=>({n:i+1,status:'open'}))};
  await dbIns('ddl_deals',of);
  if(isOwn) alert('✅ Apne group ki deal ready! Link deals list mein hai — buyers ko share karo.');
  else alert('✅ '+medCode+' ko assign ho gayi! Ab woh login karke apna Buyer Less set karega, tab link active hoga.');
  adminMain('deals');
}
async function delOffer(id){
  if(!confirm('Yeh offer delete karein?'))return;
  await dbDel('ddl_deals',id);
  adminMain('deals');
}
function adminMeds(){
  const {meds,orders}=window._D;
  document.getElementById('admin-body').innerHTML= meds.length===0
    ? '<div class="alert a-warn">Abhi koi mediator registered nahi. Unhe ?v=mediator link bhejo.</div>'
    : `<div class="table-wrap"><table>
      <thead><tr><th>Name</th><th>Code</th><th>UPI</th><th>Orders</th><th>Wallet (earned)</th><th>Pending</th></tr></thead>
      <tbody>${meds.map(m=>{
        const mo=orders.filter(o=>o.mediatorCode===m.code);

        return `<tr><td style="font-weight:700;">${esc(m.name)}</td><td><span class="badge b-blue">${esc(m.code)}</span></td><td>${esc(m.upi||'—')}</td><td>${mo.length}</td><td style="color:var(--accent);font-weight:800;">₹${w}</td><td style="color:var(--warn);font-weight:700;">₹${p}</td></tr>`;
      }).join('')}</tbody></table></div>`;
}
async function adminNext(id){
  const o=window._D.orders.find(x=>x.id===id); if(!o)return;
  const idx=STATUS_FLOW.indexOf(o.status);
  if(idx>=STATUS_FLOW.length-1){alert('Already final!');return;}
  if(STATUS_FLOW[idx+1]==='Refunded'){ adminRefund(id); return; }
  o.status=STATUS_FLOW[idx+1];
  o.history=o.history||[]; o.history.push({s:o.status,d:today()});
  await dbUpd('ddl_orders',o); adminMain('orders');
}
async function adminRefund(id){
  const o=window._D.orders.find(x=>x.id===id); if(!o)return;
  const suggested=(+o.price||0)-(+o.buyerLess||0);
  const amt=prompt('Refund amount (₹):', suggested);
  if(amt===null)return;
  o.status='Refunded';
  o.refund=o.refund||{}; o.refund.amount=+amt||0; o.refund.refundedDate=today();
  o.history=o.history||[]; o.history.push({s:'Refunded',d:today()});
  await dbUpd('ddl_orders',o);
  alert('✅ Refunded ₹'+amt+'!\n'+(o.cut>0?('Mediator '+o.mediatorCode+' ke wallet mein ₹'+o.cut+' add ho gaya.'):''));
  adminMain(window._curAdminTab||'orders',true);
}
async function adminNote(id){
  const o=window._D.orders.find(x=>x.id===id); if(!o)return;
  const n=prompt('Buyer ko message (status check pe dikhega):', o.adminNote||'');
  if(n===null)return;
  o.adminNote=n; await dbUpd('ddl_orders',o); adminMain('orders');
}
function adminShots(id){
  const o=window._D.orders.find(x=>x.id===id); if(!o)return;
  const w=window.open('','_blank');
  let h='<body style="background:#111;display:flex;gap:20px;flex-wrap:wrap;padding:20px;">';
  h+=(o.screenshot?'<div><p style="color:#fff;font-family:sans-serif;">Order Screenshot</p><img src="'+o.screenshot+'" style="max-width:420px;border-radius:10px;"></div>':'<p style="color:#fff;">No order screenshot</p>');
  const shots=(o.refund&&o.refund.shots)||[];

  shots.forEach((s2,i)=>{ h+='<div><p style="color:#fff;font-family:sans-serif;">'+(labels[i]||'Screenshot '+(i+1))+'</p><img src="'+s2+'" style="max-width:420px;border-radius:10px;"></div>'; });

  w.document.write(h+'</body>');
}

// ══════════ ALARM / NOTIFICATIONS (Swiggy-style) ══════════
if('serviceWorker' in navigator){ try{ navigator.serviceWorker.register('sw.js'); }catch(e){} }

let _alarmTimer=null, _audioCtx=null;
function playAlarm(times){
  try{
    _audioCtx=_audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const ctx=_audioCtx; let t=ctx.currentTime;
    for(let i=0;i<(times||3);i++){
      [880,1174,1568].forEach((f,j)=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type='sine'; o.frequency.value=f;
        g.gain.setValueAtTime(0.0001,t+j*0.15);
        g.gain.exponentialRampToValueAtTime(0.4,t+j*0.15+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001,t+j*0.15+0.3);
        o.connect(g); g.connect(ctx.destination);
        o.start(t+j*0.15); o.stop(t+j*0.15+0.35);
      });
      t+=0.7;
    }
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([300,150,300,150,600]);
}
function notify(title,body){
  if(Notification&&Notification.permission==='granted'){
    try{ new Notification(title,{body,icon:'icon-192.png'}); }catch(e){}
  }
}
function alertBtnHtml(kind){
  const on=localStorage.getItem('ddl_alerts_'+kind)==='1';
  return `<button class="btn ${on?'btn-green':'btn-outline'}" id="alert-btn" onclick="toggleAlerts('${kind}')">${on?'🔔 Alerts ON':'🔕 Alerts OFF — Tap to turn ON'}</button>`;
}
async function toggleAlerts(kind){
  const key='ddl_alerts_'+kind;
  if(localStorage.getItem(key)==='1'){
    localStorage.setItem(key,'0');
    if(_alarmTimer){clearInterval(_alarmTimer);_alarmTimer=null;}
    document.getElementById('alert-btn').className='btn btn-outline';
    document.getElementById('alert-btn').textContent='🔕 Alerts OFF — Tap to turn ON';
    return;
  }
  if(Notification&&Notification.permission!=='granted') await Notification.requestPermission();
  localStorage.setItem(key,'1');
  playAlarm(1); // test sound + unlock audio
  document.getElementById('alert-btn').className='btn btn-green';
  document.getElementById('alert-btn').textContent='🔔 Alerts ON';
  startAlertLoop(kind);
}
function startAlertLoop(kind){
  if(_alarmTimer) clearInterval(_alarmTimer);
  const seenKey='ddl_seen_'+kind;
  _alarmTimer=setInterval(async()=>{
    try{
      const st=await loadStore(true);
      if(kind==='deals'){
        const active=(st.deals||[]).filter(d=>d.type==='offer'&&d.active&&d.buyerLess!=null);
        const seen=JSON.parse(localStorage.getItem(seenKey)||'[]');
        const fresh=active.filter(d=>!seen.includes(d.id));
        if(seen.length&&fresh.length){
          playAlarm(4);
          notify('🛍️ NEW DEAL AAYI HAI!', fresh[0].productName+' — abhi check karo!');
        }
        localStorage.setItem(seenKey,JSON.stringify(active.map(d=>d.id)));
      } else {
        const orders=st.orders||[];
        const seen=JSON.parse(localStorage.getItem(seenKey)||'[]');
        const fresh=orders.filter(o=>!seen.includes(o.id));
        if(seen.length&&fresh.length){
          playAlarm(4);
          notify('📦 NAYA ORDER AAYA!', fresh.length+' naya order — '+(fresh[0].name||''));
        }
        localStorage.setItem(seenKey,JSON.stringify(orders.map(o=>o.id)));
      }
    }catch(e){}
  }, 45000);
}
function resumeAlerts(){
  ['deals','orders'].forEach(k=>{ if(localStorage.getItem('ddl_alerts_'+k)==='1'){
    const pageKind=(view==='admin')?'orders':'deals';
    if(k===pageKind) startAlertLoop(k);
  }});
}

const view = Q.get('v') || 'home';
({home:renderHome, buyer:renderBuyer, client:renderClient, mediator:renderMediator, admin:renderAdmin}[view]||renderHome)();
setTimeout(resumeAlerts,1000);
