<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDL — Daily Deals Legends</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap');
:root{
  --primary:#4F46E5;--primary-2:#7C3AED;--pink:#DB2777;--primary-light:#EEF2FF;--primary-dark:#4338CA;
  --accent:#0D9488;--accent-light:#F0FDFA;--warn:#D97706;--warn-light:#FFFBEB;--danger:#E11D48;--danger-light:#FFF1F2;
  --bg:#F6F5FB;--surface:#fff;--border:#E7E5F4;--border-dark:#CDC9E8;--text:#1E1B3A;--text-2:#534F73;--text-3:#9B97B8;
  --grad:linear-gradient(120deg,#4F46E5 0%,#7C3AED 55%,#DB2777 115%);
  --shadow-sm:0 1px 2px rgba(35,32,70,.05),0 4px 14px rgba(79,70,229,.06);
  --shadow-md:0 4px 8px rgba(35,32,70,.06),0 14px 38px rgba(79,70,229,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
h1,h2,h3,.brand,.big{font-family:'Sora',sans-serif;}
.wrap{max-width:560px;margin:0 auto;padding:18px 14px 40px;}
.wide{max-width:980px;}
.topbrand{text-align:center;padding:22px 0 8px;}
.topbrand .brand{font-size:24px;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-.5px;}
.topbrand .sub{font-size:11px;color:var(--text-3);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-top:3px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm);}
.btn{padding:12px 20px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .16s;font-family:'Manrope',sans-serif;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
.btn-grad{background:var(--grad);color:#fff;box-shadow:0 6px 18px rgba(124,58,237,.3);width:100%;}
.btn-grad:hover{transform:translateY(-1px);}
.btn-outline{background:#fff;border:1.5px solid var(--border-dark);color:var(--text-2);}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);}
.btn-sm{padding:7px 14px;font-size:12.5px;border-radius:9px;}
.btn-green{background:linear-gradient(120deg,#0D9488,#059669);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:800;color:var(--text-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:11px;font-size:14px;font-family:'Manrope',sans-serif;outline:none;background:#FCFBFF;transition:all .2s;}
.field input:focus,.field select:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 4px rgba(79,70,229,.1);}
.badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:11.5px;font-weight:700;}
.b-green{background:var(--accent-light);color:#0F766E;}
.b-blue{background:var(--primary-light);color:var(--primary-dark);}
.b-yellow{background:var(--warn-light);color:#92400E;}
.b-red{background:var(--danger-light);color:#BE123C;}
.b-gray{background:#F1EFF9;color:var(--text-2);}
.b-pink{background:#FCE7F3;color:#BE185D;}
.alert{border-radius:13px;padding:13px 16px;font-size:13px;margin-bottom:14px;font-weight:600;}
.a-info{background:var(--primary-light);color:var(--primary-dark);border:1px solid #C7D2FE;}
.a-ok{background:var(--accent-light);color:#0F766E;border:1px solid #99F6E4;}
.a-warn{background:var(--warn-light);color:#92400E;border:1px solid #FDE68A;}
.a-err{background:var(--danger-light);color:#BE123C;border:1px solid #FECDD3;}
.text-sm{font-size:12.5px;color:var(--text-2);}
.muted{color:var(--text-3);font-size:12px;}
.table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border);background:#fff;}
table{width:100%;border-collapse:collapse;min-width:600px;}
thead th{background:linear-gradient(#FAF9FE,#F3F1FC);padding:10px 12px;text-align:left;font-size:10.5px;font-weight:800;color:var(--text-2);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);}
tbody td{padding:12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
.chatbox{background:#fff;border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow-md);overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 150px);min-height:480px;}
.chat-head{background:var(--grad);color:#fff;padding:15px 18px;display:flex;align-items:center;gap:12px;}
.chat-avatar{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:20px;}
.chat-head .nm{font-weight:800;font-size:15px;font-family:'Sora',sans-serif;}
.chat-head .st{font-size:11px;opacity:.85;}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:#F8F7FE;}
.msg{max-width:82%;padding:11px 14px;border-radius:15px;font-size:13.5px;line-height:1.5;animation:pop .25s ease both;white-space:pre-line;}
@keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.msg.bot{background:#fff;border:1px solid var(--border);border-bottom-left-radius:5px;align-self:flex-start;box-shadow:var(--shadow-sm);}
.msg.user{background:var(--grad);color:#fff;border-bottom-right-radius:5px;align-self:flex-end;}
.msg img{max-width:180px;border-radius:10px;display:block;margin-top:4px;}
.chat-opts{display:flex;flex-wrap:wrap;gap:8px;align-self:flex-start;animation:pop .3s ease both;}
.chat-opt{background:#fff;border:1.5px solid var(--primary);color:var(--primary);padding:9px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.chat-opt:hover{background:var(--primary);color:#fff;}
.chat-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);background:#fff;}
.chat-input input{flex:1;padding:12px 15px;border:1.5px solid var(--border);border-radius:24px;font-size:14px;font-family:'Manrope',sans-serif;outline:none;}
.chat-input input:focus{border-color:var(--primary);}
.chat-input button{width:46px;height:46px;border-radius:50%;border:none;background:var(--grad);color:#fff;font-size:17px;cursor:pointer;flex-shrink:0;}
.timeline{display:flex;flex-direction:column;margin:10px 0;}
.tl-step{display:flex;gap:12px;}
.tl-dot{width:26px;display:flex;flex-direction:column;align-items:center;}
.tl-dot .c{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;background:#EAE8F6;color:var(--text-3);flex-shrink:0;}
.tl-dot .c.done{background:linear-gradient(120deg,#0D9488,#059669);color:#fff;}
.tl-dot .l{width:2px;flex:1;background:#EAE8F6;min-height:16px;}
.tl-dot .l.done{background:#0D9488;}
.tl-txt{padding-bottom:14px;font-size:13px;font-weight:600;}
.tl-txt .d{font-size:11px;color:var(--text-3);font-weight:600;}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px;}
.stat{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow-sm);}
.stat .v{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;}
.stat .k{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-top:3px;}
.grad-txt{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.home-links{display:grid;gap:14px;margin-top:20px;}
.home-link{background:#fff;border:1px solid var(--border);border-radius:16px;padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow-sm);text-decoration:none;color:var(--text);}
.home-link:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--primary);}
.home-link .ic{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:23px;background:var(--primary-light);flex-shrink:0;}
.home-link .t{font-weight:800;font-family:'Sora',sans-serif;font-size:15px;}
.home-link .s{font-size:12px;color:var(--text-2);margin-top:2px;}
.copybox{background:#F4F2FC;border:1px dashed var(--border-dark);border-radius:10px;padding:10px 12px;font-size:12px;word-break:break-all;margin:8px 0;font-family:monospace;cursor:pointer;}
.copybox:hover{background:#ECE9FA;}
.deal-card{border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:12px;background:#fff;}
.hidden{display:none!important;}
.tabbtns{display:flex;gap:6px;background:#EEEBFA;border-radius:14px;padding:5px;margin-bottom:18px;flex-wrap:wrap;}
.tabbtns button{flex:1;padding:9px 8px;border:none;background:transparent;border-radius:10px;font-size:12.5px;font-weight:700;color:var(--text-2);cursor:pointer;min-width:90px;}
.tabbtns button.on{background:#fff;color:var(--primary);box-shadow:0 2px 8px rgba(79,70,229,.14);}
</style>
</head>
<body>
<div id="view"></div>
<script>
// ══════════ CONFIG — GOOGLE SHEETS BACKEND ══════════
const GS_URL = "https://script.google.com/macros/s/AKfycbwW1B-XDKSx_6ssJRCJlnDN_A3oJZIR4QTbMLSpCKsqwvbIPlEJGJ9T5U1d71nEOyx_KA/exec";  // Apps Script Web App /exec URL
const ADMIN_PASS = "ddl@admin";
const REFUND_WAIT_DAYS = 5;
const ADMIN_CODE = "DDL";

const Q = new URLSearchParams(location.search);
const V = document.getElementById('view');

// ── Google Sheets DB layer ──
const TMAP = { ddl_mediators:'mediators', ddl_deals:'deals', ddl_orders:'orders' };
const TSHEET = { ddl_mediators:'MEDIATORS', ddl_deals:'DEALS', ddl_orders:'ORDERS' };
let _cache = null, _cacheAt = 0;

async function loadStore(force){
  if(!force && _cache && (Date.now()-_cacheAt) < 4000) return _cache;
  const r = await fetch(GS_URL, { method:'GET' });
  const j = await r.json();
  if(!j.ok){ alert('⚠️ Backend error: '+j.error); throw new Error(j.error); }
  _cache = j.data; _cacheAt = Date.now();
  return _cache;
}
async function dbAll(t){
  try { const st = await loadStore(); return st[TMAP[t]] || []; }
  catch(e){ console.error(e); return []; }
}
async function gsPost(payload){
  const r = await fetch(GS_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(payload) });
  const j = await r.json();
  if(!j.ok){ alert('❌ '+(j.error||'Save failed')); throw new Error(j.error); }
  return j;
}
async function dbIns(t,o){ const r=await gsPost({action:'insert', table:TSHEET[t], id:o.id, obj:o}); const saved=r.obj||o; if(_cache) (_cache[TMAP[t]]=_cache[TMAP[t]]||[]).push(saved); return saved; }
async function dbUpd(t,o){ const r=await gsPost({action:'update', table:TSHEET[t], id:o.id, obj:o}); const saved=r.obj||o; if(_cache){ const a=_cache[TMAP[t]]||[]; const i=a.findIndex(x=>x.id===o.id); if(i>-1)a[i]=saved; } return saved; }
async function dbDel(t,id){ await gsPost({action:'delete', table:TSHEET[t], id}); if(_cache){ _cache[TMAP[t]]=(_cache[TMAP[t]]||[]).filter(x=>x.id!==id); } }

function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function today(){ return new Date().toISOString().split('T')[0]; }
function daysBetween(d1,d2){ return Math.floor((new Date(d2)-new Date(d1))/86400000); }
function compressImg(file){ return new Promise(res=>{ const r=new FileReader(); r.onload=e=>{ const im=new Image(); im.onload=()=>{ const mw=900,sc=Math.min(1,mw/im.width); const c=document.createElement('canvas'); c.width=im.width*sc; c.height=im.height*sc; c.getContext('2d').drawImage(im,0,0,c.width,c.height); res(c.toDataURL('image/jpeg',0.7)); }; im.src=e.target.result; }; r.readAsDataURL(file); }); }
function copyTxt(el){ navigator.clipboard.writeText(el.textContent).then(()=>{ const o=el.style.background; el.style.background='#D1FAE5'; setTimeout(()=>el.style.background=o,600); }); }
const STATUS_FLOW = ['Ordered','Review Done','Refund Form Filled','Refunded'];
function statusBadge(s){ const m={'Ordered':'b-blue','Review Done':'b-yellow','Refund Form Filled':'b-pink','Refunded':'b-green'}; return `<span class="badge ${m[s]||'b-gray'}">${esc(s)}</span>`; }
function baseUrl(){ return location.origin+location.pathname; }

/*
DATA MODEL:
ddl_deals rows:
  type:'master' → {id,type,productCode,productName,price,qty,createdAt}  (admin banata hai)
  type:'offer'  → {id,type,dealId,productCode,productName,price,mediatorCode,adminLess,buyerLess,active,createdAt}
     - adminLess: admin ka hissa per order (admin set karta hai; apne group ke liye adminLess=buyerLess)
     - buyerLess: buyer ko kitne less pe milega (mediator set karta hai, >= adminLess)
     - Mediator ka cut per order = buyerLess - adminLess
ddl_orders: {id,gmail,name,orderId,platform,offerId,dealId,productCode,mediatorCode,adminLess,buyerLess,cut,price,status,orderDate,screenshot,refund:{},history:[],adminNote}
ddl_mediators: {id,name,code,upi,pass,createdAt}
*/

// (router moved to end of script)

// ══════════ HOME ══════════
function renderHome(){
  const b=baseUrl();
  V.innerHTML = `<div class="wrap">
    <div class="topbrand"><div class="brand">⚡ Daily Deals Legends</div><div class="sub">DDL Portal</div></div>
    <div class="home-links">
      <a class="home-link" href="?v=buyer"><div class="ic">🛍️</div><div><div class="t">Buyer Portal</div><div class="s">Order form · Refund form · Order status</div></div></a>
      <a class="home-link" href="?v=client"><div class="ic">🏪</div><div><div class="t">Client Portal</div><div class="s">Product code daalo, sab order details dekho</div></div></a>
      <a class="home-link" href="?v=mediator"><div class="ic">🤝</div><div><div class="t">Mediator Portal</div><div class="s">Apni deals, orders, wallet</div></div></a>
    </div>
    <div class="card" style="margin-top:20px;">
      <div style="font-weight:800;font-family:Sora;margin-bottom:8px;">🔗 Share Links (tap = copy)</div>
      <div class="muted">Buyer:</div><div class="copybox" onclick="copyTxt(this)">${b}?v=buyer</div>
      <div class="muted">Client:</div><div class="copybox" onclick="copyTxt(this)">${b}?v=client</div>
      <div class="muted">Mediator:</div><div class="copybox" onclick="copyTxt(this)">${b}?v=mediator</div>
    </div>
  </div>`;
}

// ══════════ BUYER CHATBOT ══════════
let msgs, CS;
function savedGmail(){ return localStorage.getItem('ddl_gmail')||''; }

function renderBuyer(){
  V.innerHTML = `<div class="wrap">
    <div class="topbrand"><div class="brand">⚡ DDL Assistant</div><div class="sub">Buyer Support Agent</div></div>
    <div class="chatbox">
      <div class="chat-head"><div class="chat-avatar">🤖</div><div><div class="nm">DDL Agent</div><div class="st">● Online</div></div></div>
      <div class="chat-msgs" id="cm"></div>
      <div class="chat-input"><input id="ci" placeholder="Type here..." onkeydown="if(event.key==='Enter')sendChat()"><button onclick="sendChat()">➤</button></div>
    </div>
  </div>`;
  msgs=document.getElementById('cm');
  CS={step:'', order:{}, offerFromLink:Q.get('deal')||null};
  const g=savedGmail();
  if(!g){
    CS.step='g';
    botSay('Namaste! 🙏 Main DDL Agent hoon.\n\nPehli baar aaye hain — apna Gmail address batayiye (yeh sirf ek baar poochha jayega, system mein save rahega):');
    return;
  }
  CS.order.gmail=g;
  if(CS.offerFromLink){ botSay('Namaste! 🙏 ('+g+')\nAapki deal load ho rahi hai...'); loadLinkedOffer(); return; }
  mainMenu('Namaste! 🙏 ('+g+')');
}
function mainMenu(prefix){
  CS.step='code';
  botSay((prefix?prefix+'\n\n':'')+'Product Code ya Deal Code daaliye:\n• Sirf code (e.g. 1001) → DDL ki deal\n• MEDIATOR-CODE (e.g. ANKITA-1001) → mediator ki deal\n\nYa neeche se option choose karein:');
  showOpts(['💸 Refund Form','🔍 Order Status','✉️ Change Gmail']);
}
async function loadLinkedOffer(){
  const deals=await dbAll('ddl_deals');
  const of=deals.find(d=>d.id===CS.offerFromLink&&d.type==='offer'&&d.active&&d.buyerLess!=null);
  if(!of){ botSay('❌ Yeh deal link active nahi hai. Mediator se naya link maangein.'); mainMenu(''); return; }
  showDeal(of);
}
function showDeal(of){
  CS.offer=of; CS.step='confirm';
  const refund=(+of.price||0)-(+of.buyerLess||0);
  let html='<div style="font-weight:800;margin-bottom:6px;">🎁 Deal Details</div>';
  if(of.image) html+='<img src="'+of.image+'" style="max-width:200px;border-radius:10px;margin-bottom:8px;">';
  html+='📦 <b>'+esc(of.productName)+'</b> ('+esc(of.productCode)+')\n💰 Price: ₹'+esc(of.price)+'\n🔻 Less: ₹'+esc(of.buyerLess)+'\n✅ <b>Refund milega: ₹'+refund+'</b>\n🤝 By: '+esc(of.mediatorCode);
  botSay(html.replace(/\\n/g,'<br>'),true);
  showOpts(['🛒 Order Karna Hai','🔙 Back']);
}
function botSay(t,html){ const d=document.createElement('div'); d.className='msg bot'; if(html)d.innerHTML=t; else d.textContent=t; msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight; }
function userSay(t){ const d=document.createElement('div'); d.className='msg user'; d.textContent=t; msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight; }
function showOpts(arr){ const w=document.createElement('div'); w.className='chat-opts'; arr.forEach(o=>{ const b=document.createElement('button'); b.className='chat-opt'; b.textContent=o; b.onclick=()=>{ w.remove(); userSay(o); handleChat(o); }; w.appendChild(b); }); msgs.appendChild(w); msgs.scrollTop=msgs.scrollHeight; }
function showUpload(label){ const w=document.createElement('div'); w.className='chat-opts'; const b=document.createElement('button'); b.className='chat-opt'; b.textContent=label||'📸 Upload Screenshot'; b.onclick=()=>{ const f=document.createElement('input'); f.type='file'; f.accept='image/*'; f.onchange=async e=>{ if(!e.target.files[0])return; w.remove(); const img=await compressImg(e.target.files[0]); const d=document.createElement('div'); d.className='msg user'; d.innerHTML='<img src="'+img+'">'; msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight; handleChat(img); }; f.click(); }; w.appendChild(b); msgs.appendChild(w); msgs.scrollTop=msgs.scrollHeight; }
function sendChat(){ const i=document.getElementById('ci'); const t=i.value.trim(); if(!t)return; i.value=''; userSay(t); handleChat(t); }

function statusView(o){
  const idx=STATUS_FLOW.indexOf(o.status);
  let tl='<div style="font-weight:800;margin-bottom:8px;">📦 '+esc(o.orderId)+' · '+esc(o.productCode||'')+'</div><div class="timeline">';
  STATUS_FLOW.forEach((st,i)=>{
    const done=i<=idx;
    const h=(o.history||[]).find(x=>x.s===st);
    tl+='<div class="tl-step"><div class="tl-dot"><div class="c '+(done?'done':'')+'">'+(done?'✓':(i+1))+'</div>'+(i<STATUS_FLOW.length-1?'<div class="l '+(i<idx?'done':'')+'"></div>':'')+'</div><div class="tl-txt">'+st+(h?'<div class="d">'+h.d+'</div>':'')+'</div></div>';
  });
  tl+='</div>';
  if(o.status==='Refunded') tl+='<div class="alert a-ok" style="margin:6px 0 0;">✅ REFUND DONE: ₹'+esc(o.refund&&o.refund.amount!=null?o.refund.amount:((+o.price||0)-(+o.buyerLess||0)))+'</div>';
  else if(o.status==='Refund Form Filled') tl+='<div class="alert a-warn" style="margin:6px 0 0;">⏳ Refund PENDING — process ho raha hai</div>';
  else tl+='<div class="muted">Expected refund: ₹'+((+o.price||0)-(+o.buyerLess||0))+'</div>';
  if(o.adminNote) tl+='<div class="alert a-err" style="margin:6px 0 0;">📢 Admin: '+esc(o.adminNote)+'</div>';
  return tl;
}

async function handleChat(input){
  const s=CS;
  // Global options available from code step
  if(s.step==='code'||s.step==='confirm'){
    if(input.includes('Refund Form')){ s.step='r_find'; botSay('Apna Order ID batayiye:'); return; }
    if(input.includes('Order Status')){ s.step='s_find'; botSay('Apna Order ID batayiye: 🔍'); return; }
    if(input.includes('Change Gmail')){ s.step='g'; botSay('Naya Gmail address batayiye:'); return; }
  }
  // GMAIL (once)
  if(s.step==='g'){
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(input)){ botSay('❌ Valid email daaliye (e.g. name@gmail.com):'); return; }
    localStorage.setItem('ddl_gmail',input);
    CS.order.gmail=input;
    botSay('✅ Gmail save ho gaya! Ab dobara nahi poochha jayega.');
    if(CS.offerFromLink){ loadLinkedOffer(); return; }
    mainMenu(''); return;
  }
  // PRODUCT/DEAL CODE
  if(s.step==='code'){
    const raw=input.trim().toUpperCase();
    const deals=await dbAll('ddl_deals');
    const offers=deals.filter(d=>d.type==='offer'&&d.active&&d.buyerLess!=null);
    let of=null;
    if(raw.includes('-')){
      of=offers.find(d=>((d.mediatorCode+'-'+d.productCode).toUpperCase()===raw));
    } else {
      of=offers.find(d=>d.mediatorCode===ADMIN_CODE&&String(d.productCode).toUpperCase()===raw);
    }
    if(!of){ botSay('❌ Is code par koi active deal nahi mili.\n\n• DDL deal: sirf product code (e.g. 1001)\n• Mediator deal: MEDIATOR-CODE (e.g. ANKITA-1001)\n\nDobara try karein:'); showOpts(['💸 Refund Form','🔍 Order Status']); return; }
    showDeal(of); return;
  }
  // DEAL CONFIRM
  if(s.step==='confirm'){
    if(input.includes('Back')){ mainMenu(''); return; }
    if(input.includes('Order Karna Hai')){
      const of=s.offer;
      s.order.offerId=of.id; s.order.dealId=of.dealId; s.order.productCode=of.productCode;
      s.order.mediatorCode=of.mediatorCode; s.order.adminLess=+of.adminLess||0; s.order.buyerLess=+of.buyerLess||0;
      s.order.cut=(+of.buyerLess||0)-(+of.adminLess||0); s.order.price=+of.price||0;
      s.step='o_name'; botSay('Apna Full Name batayiye:'); return;
    }
  }
  // ORDER FLOW
  if(s.step==='o_name'){ s.order.name=input; s.step='o_orderid'; botSay('Apna Order ID batayiye:'); return; }
  if(s.step==='o_orderid'){
    const all=await dbAll('ddl_orders');
    if(all.find(o=>o.orderId===input)){ botSay('⚠️ Yeh Order ID already registered hai!'); mainMenu(''); return; }
    s.order.orderId=input; s.order.platform='';
    s.step='o_platform'; botSay('Kis platform se order kiya?'); showOpts(['Meesho','Amazon','Flipkart']); return;
  }
  if(s.step==='o_platform'){ s.order.platform=input; s.step='o_shot'; botSay('Order ka screenshot upload karein: 📸'); showUpload(); return; }
  if(s.step==='o_shot'){
    s.order.screenshot=input;
    botSay('⏳ Order register ho raha hai...');
    let o={ id:'ord_'+Date.now(), ...s.order, status:'Ordered', orderDate:today(), refund:{}, history:[{s:'Ordered',d:today()}] };
    o=await dbIns('ddl_orders',o)||o;
    botSay('🎉 Order successfully registered!\n\nYeh raha aapka current status: 👇');
    botSay(statusView(o),true);
    botSay('✅ Confirm ho gaya! '+REFUND_WAIT_DAYS+' din baad review/rating karke Refund Form bharein. Order ID sambhal ke rakhein: '+o.orderId);
    mainMenu(''); return;
  }
  // REFUND FLOW
  if(s.step==='r_find'){
    const all=await dbAll('ddl_orders');
    const o=all.find(x=>x.orderId===input)||all.filter(x=>x.gmail===input).pop();
    if(!o){ botSay('❌ Koi order nahi mila. Order ID dobara check karein:'); return; }
    botSay(statusView(o),true);
    if(o.status==='Refunded'){ mainMenu(''); return; }
    if(o.status==='Refund Form Filled'){ botSay('⏳ Refund form already submitted hai.'); mainMenu(''); return; }
    const days=daysBetween(o.orderDate,today());
    if(days<REFUND_WAIT_DAYS){ botSay('⏳ Refund form '+REFUND_WAIT_DAYS+' din baad khulega.\nAbhi '+days+' din hue — '+(REFUND_WAIT_DAYS-days)+' din baaki.\nTab tak review/rating kar dein! ⭐'); mainMenu(''); return; }
    s.refOrder=o; s.step='r_type';
    botSay('✅ Refund form khul gaya!\n\nAapne kya kiya hai — Rating ya Review?\n\n⭐ Rating → Rating + Seller Feedback dono screenshots dene honge\n📝 Review → sirf Review screenshot');
    showOpts(['⭐ Rating','📝 Review']); return;
  }
  if(s.step==='r_type'){
    if(input.includes('Rating')){ s.refType='Rating'; s.refShots=[]; s.step='r_shot_rating'; botSay('⭐ Rating ka screenshot upload karein:'); showUpload('📸 Rating Screenshot'); return; }
    if(input.includes('Review')){ s.refType='Review'; s.refShots=[]; s.step='r_shot_review'; botSay('📝 Review ka screenshot upload karein:'); showUpload('📸 Review Screenshot'); return; }
    botSay('Rating ya Review select karein:'); showOpts(['⭐ Rating','📝 Review']); return;
  }
  if(s.step==='r_shot_rating'){ s.refShots.push(input); s.step='r_shot_feedback'; botSay('✅ Rating screenshot mil gaya!\n\nAb Seller Feedback ka screenshot upload karein (compulsory):'); showUpload('📸 Seller Feedback Screenshot'); return; }
  if(s.step==='r_shot_feedback'){ s.refShots.push(input); s.step='r_upi'; botSay('✅ Dono screenshots mil gaye!\n\nApna UPI ID batayiye (e.g. name@paytm):'); return; }
  if(s.step==='r_shot_review'){ s.refShots.push(input); s.step='r_upi'; botSay('✅ Review screenshot mil gaya!\n\nApna UPI ID batayiye (e.g. name@paytm):'); return; }
  if(s.step==='r_upi'){
    if(!input.includes('@')){ botSay('❌ Valid UPI ID daaliye (e.g. name@paytm):'); return; }
    botSay('⏳ Submit ho raha hai...');
    const o=s.refOrder;
    o.status='Refund Form Filled';
    o.refund={ upi:input, type:s.refType, shots:[...s.refShots], filledDate:today() };
    o.history=o.history||[]; o.history.push({s:'Refund Form Filled',d:today()});
    await dbUpd('ddl_orders',o);
    botSay('🎉 Refund form submitted!\n\n📋 Type: '+s.refType+'\n💳 UPI: '+input+'\n💵 Expected: ₹'+((+o.price||0)-(+o.buyerLess||0))+'\n\nAdmin verify karke refund karega. Order ID daal kar kabhi bhi status check karein — Done hone par yahin dikhega, koi dikkat hui toh admin ka comment bhi yahin aayega. ✅');
    mainMenu(''); return;
  }
  // STATUS
  if(s.step==='s_find'){
    const all=await dbAll('ddl_orders');
    const found=all.filter(o=>o.orderId===input||o.gmail===input);
    if(!found.length){ botSay('❌ Koi order nahi mila:'); return; }
    for(const o of found) botSay(statusView(o),true);
    mainMenu(''); return;
  }
  // fallback
  if(!s.step) mainMenu('');
}

async function setBuyerLess(offerId){

  of.buyerLess=val; of.active=true;
  await dbUpd('ddl_deals',of);
  alert('✅ Deal activate! Tumhara cut: ₹'+(val-of.adminLess)+'/order');
  medDash();
}

          return `<div style="border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;">
            <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;">
              <div><strong>${esc(of.mediatorCode)}</strong> · Admin Less <span class="badge b-yellow">₹${esc(of.adminLess)}</span> · Buyer Less ${of.buyerLess!=null?'<span class="badge b-pink">₹'+esc(of.buyerLess)+'</span>':'<span class="badge b-gray">not set</span>'} ${of.buyerLess!=null?'· Cut <span class="badge b-green">₹'+(of.buyerLess-of.adminLess)+'</span>':''}</div>
              <div><span class="badge b-gray">${ofOrders.length} orders</span> <button class="btn btn-sm btn-danger" onclick="delOffer('${of.id}')">🗑</button></div>
            </div>
            ${of.buyerLess!=null?`<div class="copybox" onclick="copyTxt(this)" style="margin:6px 0 0;">${b}?v=buyer&deal=${of.id}</div>`:''}
          </div>`;
        }).join('')||'<div class="muted">Abhi kisi ko assign nahi kiya.</div>'}
      </div>`;
    }).join('')||'<div class="alert a-warn">Abhi koi master deal nahi. Upar se banao!</div>'}`;
}
async function createMaster(){
  const pc=document.getElementById('md-pc').value.trim().toUpperCase();
  const pn=document.getElementById('md-pn').value.trim();
  const price=+document.getElementById('md-price').value||0;
  const qty=+document.getElementById('md-qty').value||0;
  if(!pc||!pn||!price){alert('Code, name, price required!');return;}
  let image='';
  const f=document.getElementById('md-img').files[0];
  if(f) image=await compressImg(f);
  await dbIns('ddl_deals',{id:'deal_'+Date.now(),type:'master',productCode:pc,productName:pn,price,qty,image,createdAt:today()});
  adminMain('deals');
}
async function assignOffer(dealId){
  const {deals}=window._D;
  const m=deals.find(d=>d.id===dealId);
  const medCode=document.getElementById('as-med-'+dealId).value;
  const adminLess=+document.getElementById('as-less-'+dealId).value;
  if(isNaN(adminLess)){alert('Admin Less daalo (0 bhi chal sakta hai full refund ke liye)!');return;}
  const isOwn=medCode===ADMIN_CODE;
  const of={id:'offer_'+Date.now(),type:'offer',dealId,productCode:m.productCode,productName:m.productName,price:m.price,image:m.image||'',
    mediatorCode:medCode,adminLess,buyerLess:isOwn?adminLess:null,active:isOwn,createdAt:today()};
  await dbIns('ddl_deals',of);
  if(isOwn) alert('✅ Apne group ki deal ready! Link deals list mein hai — buyers ko share karo.');
  else alert('✅ '+medCode+' ko assign ho gayi! Ab woh login karke apna Buyer Less set karega, tab link active hoga.');
  adminMain('deals');
}
async function delOffer(id){
  if(!confirm('Yeh offer delete karein?'))return;
  await dbDel('ddl_deals',id);
  adminMain('deals');
}
function adminMeds(){
  const {meds,orders}=window._D;
  document.getElementById('admin-body').innerHTML= meds.length===0
    ? '<div class="alert a-warn">Abhi koi mediator registered nahi. Unhe ?v=mediator link bhejo.</div>'
    : `<div class="table-wrap"><table>
      <thead><tr><th>Name</th><th>Code</th><th>UPI</th><th>Orders</th><th>Wallet (earned)</th><th>Pending</th></tr></thead>
      <tbody>${meds.map(m=>{
        const mo=orders.filter(o=>o.mediatorCode===m.code);
        const w=mo.filter(o=>o.status==='Refunded').reduce((s,o)=>s+(+o.cut||0),0);
        const p=mo.filter(o=>o.status!=='Refunded').reduce((s,o)=>s+(+o.cut||0),0);
        return `<tr><td style="font-weight:700;">${esc(m.name)}</td><td><span class="badge b-blue">${esc(m.code)}</span></td><td>${esc(m.upi||'—')}</td><td>${mo.length}</td><td style="color:var(--accent);font-weight:800;">₹${w}</td><td style="color:var(--warn);font-weight:700;">₹${p}</td></tr>`;
      }).join('')}</tbody></table></div>`;
}
async function adminNext(id){
  const o=window._D.orders.find(x=>x.id===id); if(!o)return;
  const idx=STATUS_FLOW.indexOf(o.status);
  if(idx>=STATUS_FLOW.length-1){alert('Already final!');return;}
  if(STATUS_FLOW[idx+1]==='Refunded'){ adminRefund(id); return; }
  o.status=STATUS_FLOW[idx+1];
  o.history=o.history||[]; o.history.push({s:o.status,d:today()});
  await dbUpd('ddl_orders',o); adminMain('orders');
}
async function adminRefund(id){
  const o=window._D.orders.find(x=>x.id===id); if(!o)return;
  const suggested=(+o.price||0)-(+o.buyerLess||0);
  const amt=prompt('Refund amount (₹):', suggested);
  if(amt===null)return;
  o.status='Refunded';
  o.refund=o.refund||{}; o.refund.amount=+amt||0; o.refund.refundedDate=today();
  o.history=o.history||[]; o.history.push({s:'Refunded',d:today()});
  await dbUpd('ddl_orders',o);
  alert('✅ Refunded ₹'+amt+'!\n'+(o.cut>0?('Mediator '+o.mediatorCode+' ke wallet mein ₹'+o.cut+' add ho gaya.'):''));
  adminMain('orders');
}
async function adminNote(id){
  const o=window._D.orders.find(x=>x.id===id); if(!o)return;
  const n=prompt('Buyer ko message (status check pe dikhega):', o.adminNote||'');
  if(n===null)return;
  o.adminNote=n; await dbUpd('ddl_orders',o); adminMain('orders');
}
function adminShots(id){
  const o=window._D.orders.find(x=>x.id===id); if(!o)return;
  const w=window.open('','_blank');
  let h='<body style="background:#111;display:flex;gap:20px;flex-wrap:wrap;padding:20px;">';
  h+=(o.screenshot?'<div><p style="color:#fff;font-family:sans-serif;">Order Screenshot</p><img src="'+o.screenshot+'" style="max-width:420px;border-radius:10px;"></div>':'<p style="color:#fff;">No order screenshot</p>');
  const shots=(o.refund&&o.refund.shots)||[];
  const labels=o.refund&&o.refund.type==='Rating'?['Rating Screenshot','Seller Feedback']:['Review Screenshot'];
  shots.forEach((s2,i)=>{ h+='<div><p style="color:#fff;font-family:sans-serif;">'+(labels[i]||'Screenshot '+(i+1))+'</p><img src="'+s2+'" style="max-width:420px;border-radius:10px;"></div>'; });
  if(o.refund&&o.refund.reviewShot) h+='<div><p style="color:#fff;font-family:sans-serif;">Review Screenshot</p><img src="'+o.refund.reviewShot+'" style="max-width:420px;border-radius:10px;"></div>';
  w.document.write(h+'</body>');
}

const view = Q.get('v') || 'home';
({home:renderHome, buyer:renderBuyer, client:renderClient, mediator:renderMediator, admin:renderAdmin}[view]||renderHome)();
</script>
</body>
