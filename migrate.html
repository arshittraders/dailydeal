<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDL — Legacy Import Tool</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;max-width:520px;margin:20px auto;padding:16px;background:#F6F5FB;}
.card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:16px;}
h2{margin-top:0;}
button{background:linear-gradient(120deg,#4F46E5,#7C3AED);color:#fff;border:none;padding:14px 20px;border-radius:10px;font-weight:800;font-size:15px;width:100%;cursor:pointer;}
button:disabled{opacity:.5;}
#log{font-family:monospace;font-size:12px;background:#111;color:#0f0;padding:10px;border-radius:8px;height:220px;overflow-y:auto;white-space:pre-wrap;}
.bar-wrap{background:#eee;border-radius:8px;height:14px;overflow:hidden;margin:10px 0;}
.bar{background:#4F46E5;height:100%;width:0%;transition:width .2s;}
.stat{font-size:13px;color:#555;margin-top:8px;}
</style>
</head>
<body>
<div class="card">
  <h2>📦 DDL Legacy Orders Import</h2>
  <p>Yeh tool <strong>legacy_orders.json</strong> se purana data padhega aur Supabase (<code>ddl_orders</code> table) mein batch-by-batch daalega. Safe hai dobara chalane ke liye (upsert — duplicate nahi banega).</p>
  <button id="startBtn" onclick="startImport()">🚀 Import Start Karein</button>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div class="stat" id="stat">Ready.</div>
</div>
<div class="card">
  <div id="log">Waiting to start...\n</div>
</div>
<script>
const SB_URL = "https://thmbyzgccgedtxxwluii.supabase.co";
const SB_KEY = "sb_publishable_X0lsfupRNvTqIyqthEDkLg_6nWlGVuH";
const supa = window.supabase.createClient(SB_URL, SB_KEY);
const logEl = document.getElementById('log');
const barEl = document.getElementById('bar');
const statEl = document.getElementById('stat');
function log(t){ logEl.textContent += t+'\n'; logEl.scrollTop = logEl.scrollHeight; }

async function startImport(){
  document.getElementById('startBtn').disabled = true;
  log('⏳ legacy_orders.json fetch ho raha hai...');
  let data;
  try{
    const r = await fetch('./legacy_orders.json');
    data = await r.json();
  }catch(e){ log('❌ File load nahi hui: '+e.message); document.getElementById('startBtn').disabled=false; return; }
  log('✅ '+data.length+' records mile. Import shuru...');
  const BATCH = 200;
  let done = 0, errors = 0;
  for(let i=0;i<data.length;i+=BATCH){
    const batch = data.slice(i,i+BATCH).map(r=>({ id:r.id, data:r }));
    try{
      const { error } = await supa.from('ddl_orders').upsert(batch, { onConflict:'id' });
      if(error){ errors++; log('⚠️ Batch '+(i/BATCH+1)+' error: '+error.message); }
      else { done += batch.length; log('✅ Batch '+(i/BATCH+1)+' done ('+done+'/'+data.length+')'); }
    }catch(e){ errors++; log('⚠️ Batch '+(i/BATCH+1)+' failed: '+e.message); }
    const pct = Math.round(((i+batch.length)/data.length)*100);
    barEl.style.width = pct+'%';
    statEl.textContent = done+' / '+data.length+' imported — '+errors+' batch errors';
  }
  log('🎉 IMPORT COMPLETE! Total imported: '+done+' / '+data.length+' ('+errors+' batch errors)');
  statEl.textContent = '✅ Done! '+done+'/'+data.length+' imported.';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').textContent = '🔁 Dobara Run Karein (safe)';
}
</script>
</body>
</html>
